<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频眼部马赛克工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0b0e14;
  --bg-secondary:#111520;
  --bg-card:#151a27;
  --bg-card-hover:#1a2033;
  --border:#1e2536;
  --border-focus:#6366f1;
  --text-primary:#e2e8f0;
  --text-secondary:#8b95a8;
  --text-muted:#5a6478;
  --accent:#6366f1;
  --accent-light:#818cf8;
  --accent-glow:rgba(99,102,241,.25);
  --success:#22c55e;
  --error:#ef4444;
  --radius:10px;
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;line-height:1.6}
a{color:var(--accent-light);text-decoration:none}

/* layout */
.container{max-width:720px;margin:0 auto;padding:48px 20px 80px}
header{text-align:center;margin-bottom:48px}
header h1{font-size:1.75rem;font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,var(--accent-light),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:var(--text-secondary);font-size:.9rem;margin-top:6px}

/* card */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px;transition:var(--transition)}

/* drop zone */
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:var(--transition);position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(99,102,241,.04)}
.drop-zone.drag-over{box-shadow:0 0 0 3px var(--accent-glow)}
.drop-zone svg{margin:0 auto 12px;display:block;color:var(--text-muted)}
.drop-zone .main-text{font-size:.95rem;color:var(--text-primary);font-weight:500}
.drop-zone .sub-text{font-size:.8rem;color:var(--text-muted);margin-top:4px}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}

/* params */
.params{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:500px){.params{grid-template-columns:1fr}}
.param label{display:block;font-size:.8rem;color:var(--text-secondary);margin-bottom:8px;font-weight:500}
.param .slider-row{display:flex;align-items:center;gap:10px}
.param input[type=range]{flex:1;-webkit-appearance:none;background:var(--bg-secondary);height:6px;border-radius:3px;outline:none}
.param input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 3px var(--accent-glow)}
.param .val{font-size:.85rem;font-weight:600;color:var(--accent-light);min-width:32px;text-align:right}

/* btn */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--transition);width:100%}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light);box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.btn-download{background:var(--success);color:#fff;margin-top:8px}
.btn-download:hover{filter:brightness(1.1)}

/* task list */
.task-list{display:flex;flex-direction:column;gap:12px}
.task-item{background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:16px;transition:var(--transition)}
.task-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.task-name{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%}
.task-status{font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:20px}
.status-queued{background:rgba(99,102,241,.15);color:var(--accent-light)}
.status-processing{background:rgba(234,179,8,.12);color:#eab308}
.status-done{background:rgba(34,197,94,.12);color:var(--success)}
.status-error{background:rgba(239,68,68,.12);color:var(--error)}

/* progress bar */
.progress-bar{height:6px;background:var(--bg-primary);border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light));transition:width .3s ease}
.task-message{font-size:.78rem;color:var(--text-muted)}

/* empty state */
.empty{text-align:center;color:var(--text-muted);font-size:.85rem;padding:20px 0}

/* footer */
footer{text-align:center;color:var(--text-muted);font-size:.75rem;margin-top:40px}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>视频眼部马赛克工具</h1>
    <p>上传视频，自动检测人脸并对眼部区域施加马赛克</p>
  </header>

  <!-- upload -->
  <div class="card">
    <div class="drop-zone" id="dropZone">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <div class="main-text">拖拽视频文件到此处，或点击选择</div>
      <div class="sub-text">支持 MP4、AVI、MOV、MKV 等主流格式</div>
      <input type="file" id="fileInput" multiple accept="video/*">
    </div>
  </div>

  <!-- params -->
  <div class="card">
    <div class="params">
      <div class="param">
        <label>马赛克强度</label>
        <div class="slider-row">
          <input type="range" id="strength" min="2" max="20" value="8">
          <span class="val" id="strengthVal">8</span>
        </div>
      </div>
      <div class="param">
        <label>眼部扩展范围</label>
        <div class="slider-row">
          <input type="range" id="padding" min="0" max="20" value="5">
          <span class="val" id="paddingVal">0.5</span>
        </div>
      </div>
    </div>
  </div>

  <!-- task list -->
  <div class="card" id="taskCard" style="display:none">
    <div class="task-list" id="taskList"></div>
  </div>

  <footer>视频在服务端本地处理，处理完成后原始文件自动删除</footer>
</div>

<script>
const dropZone=document.getElementById("dropZone"),
      fileInput=document.getElementById("fileInput"),
      strengthSlider=document.getElementById("strength"),
      strengthVal=document.getElementById("strengthVal"),
      paddingSlider=document.getElementById("padding"),
      paddingVal=document.getElementById("paddingVal"),
      taskCard=document.getElementById("taskCard"),
      taskList=document.getElementById("taskList");

const tasks=new Map();

strengthSlider.addEventListener("input",()=>strengthVal.textContent=strengthSlider.value);
paddingSlider.addEventListener("input",()=>paddingVal.textContent=(paddingSlider.value/10).toFixed(1));

// drag & drop
["dragenter","dragover"].forEach(e=>dropZone.addEventListener(e,ev=>{ev.preventDefault();dropZone.classList.add("drag-over")}));
["dragleave","drop"].forEach(e=>dropZone.addEventListener(e,ev=>{ev.preventDefault();dropZone.classList.remove("drag-over")}));
dropZone.addEventListener("drop",ev=>{
  const files=ev.dataTransfer.files;
  if(files.length)handleFiles(files);
});
fileInput.addEventListener("change",()=>{if(fileInput.files.length){handleFiles(fileInput.files);fileInput.value=""}});

function handleFiles(files){
  for(const f of files)uploadFile(f);
}

async function uploadFile(file){
  const taskId="t_"+Math.random().toString(36).slice(2,10);
  // optimistic UI
  tasks.set(taskId,{filename:file.name,status:"uploading",progress:0,message:"上传中...",realId:null});
  renderTasks();

  const form=new FormData();
  form.append("file",file);
  form.append("strength",strengthSlider.value);
  form.append("padding",(paddingSlider.value/10).toFixed(1));

  try{
    const resp=await fetch("/upload",{method:"POST",body:form});
    const data=await resp.json();
    if(data.error){
      tasks.get(taskId).status="error";
      tasks.get(taskId).message=data.error;
      renderTasks();
      return;
    }
    const t=tasks.get(taskId);
    t.realId=data.task_id;
    t.status="processing";
    t.message="正在处理...";
    renderTasks();
    pollProgress(taskId,data.task_id);
  }catch(e){
    tasks.get(taskId).status="error";
    tasks.get(taskId).message="上传失败: "+e.message;
    renderTasks();
  }
}

function pollProgress(localId,serverId){
  const iv=setInterval(async()=>{
    try{
      const resp=await fetch("/progress/"+serverId);
      const d=await resp.json();
      const t=tasks.get(localId);
      if(!t){clearInterval(iv);return}
      t.status=d.status;
      t.progress=d.progress;
      t.message=d.message;
      renderTasks();
      if(d.status==="done"||d.status==="error")clearInterval(iv);
    }catch(e){clearInterval(iv)}
  },800);
}

function renderTasks(){
  if(tasks.size===0){taskCard.style.display="none";return}
  taskCard.style.display="block";
  let html="";
  for(const[id,t]of tasks){
    const sc=t.status==="done"?"status-done":t.status==="error"?"status-error":t.status==="processing"?"status-processing":"status-queued";
    const sl=t.status==="done"?"完成":t.status==="error"?"失败":t.status==="processing"?"处理中":"排队中";
    const dl=t.status==="done"&&t.realId?`<a class="btn btn-download" href="/download/${t.realId}">下载处理后的视频</a>`:"";
    html+=`<div class="task-item">
      <div class="task-header">
        <div class="task-name" title="${t.filename}">${t.filename}</div>
        <span class="task-status ${sc}">${sl}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${t.progress}%"></div></div>
      <div class="task-message">${t.message||""}</div>
      ${dl}
    </div>`;
  }
  taskList.innerHTML=html;
}
</script>
</body>
</html>
