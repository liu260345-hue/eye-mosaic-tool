name: Build Desktop Apps

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [master]
    paths:
      - '*.py'
      - 'web/**'
      - '.github/workflows/**'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: 视频眼部马赛克工具Web版-Windows
          - os: macos-14
            name: macOS
            artifact: 视频眼部马赛克工具Web版-macOS

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller flask mediapipe opencv-python numpy imageio-ffmpeg

      - name: Download models
        run: |
          python -c "
          import urllib.request, os
          models = {
              'face_landmarker.task': 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task',
              'face_detection_yunet_2023mar.onnx': 'https://github.com/opencv/opencv_zoo/raw/main/models/face_detection_yunet/face_detection_yunet_2023mar.onnx',
          }
          for name, url in models.items():
              if not os.path.exists(name):
                  print(f'Downloading {name}...')
                  urllib.request.urlretrieve(url, name)
                  print(f'{name} done')
          "

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm ^
            --name "视频眼部马赛克工具Web版" ^
            --console ^
            --add-data "web\templates;web\templates" ^
            --add-data "eye_mosaic.py;." ^
            --add-data "face_landmarker.task;." ^
            --add-data "face_detection_yunet_2023mar.onnx;." ^
            --hidden-import=mediapipe ^
            --hidden-import=mediapipe.tasks ^
            --hidden-import=mediapipe.tasks.python ^
            --hidden-import=mediapipe.tasks.python.vision ^
            --hidden-import=flask ^
            --hidden-import=cv2 ^
            --hidden-import=numpy ^
            --collect-all mediapipe ^
            web_launcher.py
        shell: cmd

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm \
            --name "EyeMosaicTool" \
            --console \
            --add-data "web/templates:web/templates" \
            --add-data "eye_mosaic.py:." \
            --add-data "face_landmarker.task:." \
            --add-data "face_detection_yunet_2023mar.onnx:." \
            --hidden-import=mediapipe \
            --hidden-import=mediapipe.tasks \
            --hidden-import=mediapipe.tasks.python \
            --hidden-import=mediapipe.tasks.python.vision \
            --hidden-import=flask \
            --hidden-import=cv2 \
            --hidden-import=numpy \
            --hidden-import=imageio_ffmpeg \
            --collect-all mediapipe \
            --collect-all imageio_ffmpeg \
            web_launcher.py

      - name: Create macOS launcher script
        if: runner.os == 'macOS'
        run: |
          cat > "dist/EyeMosaicTool/双击打开-视频眼部马赛克工具.command" << 'LAUNCHER'
          #!/bin/bash
          cd "$(dirname "$0")"

          echo "========================================"
          echo "  视频眼部马赛克工具 - 启动中..."
          echo "========================================"
          echo ""

          # 移除macOS隔离属性(防止Gatekeeper拦截)
          xattr -cr "$(dirname "$0")" 2>/dev/null

          # 确保主程序有执行权限
          chmod +x ./EyeMosaicTool 2>/dev/null
          chmod +x ./ffmpeg/ffmpeg ./ffmpeg/ffprobe 2>/dev/null

          # 启动主程序
          ./EyeMosaicTool

          # 如果异常退出，暂停显示错误
          if [ $? -ne 0 ]; then
              echo ""
              echo "程序异常退出，按回车键关闭..."
              read
          fi
          LAUNCHER
          chmod +x "dist/EyeMosaicTool/双击打开-视频眼部马赛克工具.command"
          chmod +x "dist/EyeMosaicTool/EyeMosaicTool"

      - name: Bundle FFmpeg for macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/EyeMosaicTool/ffmpeg
          echo "Downloading FFmpeg for macOS..."
          curl -L -o /tmp/ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" && \
            unzip -o /tmp/ffmpeg.zip -d dist/EyeMosaicTool/ffmpeg/ || echo "FFmpeg download failed, will auto-download on first run"
          curl -L -o /tmp/ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" && \
            unzip -o /tmp/ffprobe.zip -d dist/EyeMosaicTool/ffmpeg/ || echo "FFprobe download failed, will auto-download on first run"
          chmod +x dist/EyeMosaicTool/ffmpeg/* 2>/dev/null || true
          ls -la dist/EyeMosaicTool/ffmpeg/

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/视频眼部马赛克工具Web版/
          compression-level: 9

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/EyeMosaicTool/
          compression-level: 9
